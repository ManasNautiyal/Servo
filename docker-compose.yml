version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: servo_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: servo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: servo_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/servo
      - JWT_SECRET=supersecretjwtsecretkeychangeinproduction123456
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - GEMINI_API_KEY=your-gemini-api-key # Replace with active key for AI features
      - SUPABASE_URL=
      - SUPABASE_KEY=
      - SUPABASE_BUCKET=servo-storage
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/static:/app/static # Persist uploads folder locally

  frontend:
    build: ./frontend
    container_name: servo_frontend
    restart: always
    ports:
      - "3000:80" # Maps localhost:3000 to the container's Nginx port
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
